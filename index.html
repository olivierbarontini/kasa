<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/kasa/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kasa</title>
    <script>
      // Récupère l'URL redirigée depuis 404.html et restaure l'historique
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Traitement du paramètre ?p= envoyé par 404.html
        var search = location.search;
        if (search.indexOf('?p=') === 0) {
          var decoded = decodeURIComponent(search.slice(3));
          history.replaceState(null, null, '/kasa/' + decoded);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
